name: Bug Report
description: Report a bug or unexpected behavior
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thank you for reporting a bug! Please fill in the details below.

  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear and concise description of what the bug is.
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Steps to Reproduce
      description: Minimal steps to reproduce the behavior.
      placeholder: |
        1. Set up router with `createRouter([...])`
        2. Navigate to '...'
        3. Press back button
        4. See error
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What you expected to happen.
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      description: What actually happened. Include error messages or screenshots if applicable.
    validations:
      required: true

  - type: textarea
    id: code
    attributes:
      label: Code Example
      description: If applicable, provide a minimal code example that reproduces the issue.
      render: tsx

  - type: input
    id: rehynav-version
    attributes:
      label: rehynav Version
      placeholder: e.g. 0.1.0
    validations:
      required: true

  - type: input
    id: react-version
    attributes:
      label: React Version
      placeholder: e.g. 19.0.0
    validations:
      required: true

  - type: dropdown
    id: platform
    attributes:
      label: Platform
      options:
        - Web (Browser)
        - Capacitor
        - Tauri
        - Other
    validations:
      required: true

  - type: input
    id: browser
    attributes:
      label: Browser / Runtime
      placeholder: e.g. Chrome 130, Safari 18, iOS WebView

  - type: textarea
    id: additional
    attributes:
      label: Additional Context
      description: Any other context about the problem.
